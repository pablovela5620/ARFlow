[project]
authors = [{ name = "Pablo Vela", email = "pablovela5620@gmail.com" }]
name = "arflow"
requires-python = ">= 3.11"
version = "0.1.0"
dependencies = []

[build-system]
build-backend = "hatchling.build"
requires = ["hatchling"]

[tool.pixi.workspace]
channels = ["conda-forge"]
platforms = ["osx-arm64"]

[tool.pixi.pypi-dependencies]
arflow = { path = ".", editable = true }
simplecv = { git = "https://github.com/pablovela5620/simplecv.git" }

[tool.pixi.tasks]

[tool.pixi.dependencies]
python = "==3.12"
rerun-sdk = ">=0.23.2,<0.24"
numpy = ">=2"
grpcio = ">=1.71.0,<2"
grpcio-tools = ">=1.71.0,<2"
jaxtyping = ">=0.3.2,<0.4"
beartype = ">=0.20.2,<0.21"

[tool.ruff]
# gRPC generated files
extend-exclude = [
    "arflow/service_pb2.py",
    "arflow/service_pb2_grpc.py",
    "arflow/service_pb2.pyi",
]

line-length = 150
select = [
    # pycodestyle
    "E",
    # Pyflakes
    "F",
    # pyupgrade
    "UP",
    # flake8-bugbear
    "B",
    # flake8-simplify
    "SIM",
    # isort
    "I",
]

ignore = [
    "E501", # Line too long.
    "F722", # Forward annotation false positive from jaxtyping. Should be caught by pyright.
    "F821", # Forward annotation false positive from jaxtyping. Should be caught by pyright.
]

[tool.ruff.lint]
# https://github.com/astral-sh/ruff-vscode/blob/main/README.md#configuring-vs-code
extend-select = ["I"]

[tool.ruff.lint.pydocstyle]
convention = "google"
